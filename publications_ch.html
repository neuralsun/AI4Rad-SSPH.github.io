  <script src="js/main.js"></script>
  <script src="js/pub.js"></script>
  <script>
  (function () {
    var memberNameById = null;
    Promise.all([
      fetch('data/publications/manifest.json').then(function (r) { return r.json(); }),
      fetch('data/team.json').then(function (r) { return r.json(); })
    ]).then(function (res) {
      var papers = res[0], team = res[1];
      // 全站列表只显示 lab 论文（含 Yuehua Li 的）。
      papers = papers.filter(function (p) { return p.lab !== false; });
      var names = {};
      ['leader', 'pi', 'postdoc', 'phd_engineering', 'phd_medical',
       'master_engineering', 'master_medical', 'alumni'].forEach(function (cat) {
        (team[cat] || []).forEach(function (m) { names[m.id] = m.name_cn; });
      });
      memberNameById = function (id) { return names[id]; };
      window.Pub.initFilter('pub-root', papers, 'cn', memberNameById);
    }).catch(function (e) {
      document.querySelector('#pub-root .pub-list').innerHTML =
        '<li class="pub-empty">加载论文列表失败，请刷新重试。</li>';
      console.error(e);
    });
  })();
  </script>
